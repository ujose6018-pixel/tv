    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAp1IAukg9FGiOHGsRvvapN6QYzLOYDrOY",
      authDomain: "tvmundial-b190a.firebaseapp.com",
      projectId: "tvmundial-b190a",
      storageBucket: "tvmundial-b190a.firebasestorage.app",
      messagingSenderId: "324034223779",
      appId: "1:324034223779:web:49e679e822c4ae99762916"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    window.firebaseDB = db;
    window.firebaseCollections = { collection, addDoc, getDocs, onSnapshot };
  </script>

              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>

        <div class="p-8 space-y-8">
          
          <div class="bg-emerald-950/40 border border-emerald-600/40 rounded-2xl p-6 flex gap-4">

          <!-- Stream 1 -->
          <div class="space-y-4">

            <div class="flex flex-col gap-3">

              <div class="flex gap-3">
                <input id="input1" type="text" placeholder="O pega un nuevo enlace: https://ejemplo.com/stream" class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-5 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-3 focus:ring-emerald-500 transition-all">
                <input id="input1-title" type="text" placeholder="Título (ej: Argentina vs México)" class="w-56 bg-slate-800 border border-slate-600 rounded-xl px-4 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-3 focus:ring-emerald-500 transition-all">
              </div>
              
              <button id="save-stream1" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                Guardar Stream 1

          <!-- Stream 2 -->
          <div class="space-y-4 pt-4 border-t border-slate-700">

              <span class="w-8 h-8 bg-yellow-500 text-slate-900 rounded-lg flex items-center justify-center font-black text-lg">2</span>

            <div class="flex flex-col gap-3">

                <option value="">-- Selecciona un stream guardado --</option>
              </select>
              
              <div class="flex gap-3">
                <input id="input2" type="text" placeholder="O pega un nuevo enlace: https://ejemplo.com/stream2" class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-5 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-3 focus:ring-emerald-500 transition-all">
                <input id="input2-title" type="text" placeholder="Título (ej: Brasil vs España)" class="w-56 bg-slate-800 border border-slate-600 rounded-xl px-4 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-3 focus:ring-emerald-500 transition-all">
              </div>
              
              <button id="save-stream2" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                Guardar Stream 2
              </button>
            </div>
          </div>

          <div class="pt-4">
            <button id="btn-generate" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 text-slate-900 font-black text-xl py-5 px-6 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              Generar Enlace para la TV ⚽
            </button>
          </div>

          <!-- Resultado -->
          <div id="result-box" class="mt-6 p-8 bg-slate-800 rounded-2xl border border-yellow-500/40 hidden">
            <h3 class="text-lg font-bold text-yellow-400 mb-4 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6 9 17l-5-5"/>
              </svg>
              ¡Listo para ver los partidos!
            </h3>
            
            <div class="flex flex-col sm:flex-row gap-3">
              <input id="url-output" readonly class="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-slate-300 text-sm focus:outline-none truncate">
              <button id="btn-copy" class="flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all bg-yellow-500 hover:bg-yellow-400 text-slate-900">
                <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>

                <span id="text-copy">Copiar URL</span>

  <!-- ==========================================
       VISTA DEL VISOR (TV)
       ========================================== -->
  <div id="viewer-view" class="fixed inset-0 bg-black flex-col md:flex-row overflow-hidden w-full h-full hidden">
    <button id="btn-fullscreen" class="absolute top-4 left-4 z-50 bg-black/70 hover:bg-black/90 text-white p-4 rounded-2xl opacity-70 hover:opacity-100 transition-opacity backdrop-blur-xl shadow-2xl flex items-center gap-3 group">
      <svg id="icon-fullscreen" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <span id="text-fullscreen" class="hidden group-hover:inline font-bold text-lg pr-2">Pantalla Completa</span>
    </button>

    <div id="video-container" class="w-full h-full flex flex-col md:flex-row">
    </div>
  </div>

  <!-- ==========================================
       LÓGICA JAVASCRIPT
       ========================================== -->
  <script type="module">
    import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    
    document.addEventListener('DOMContentLoaded', async () => {
      const db = getFirestore();
      const streamsCol = collection(db, "streams");
      
      // Elementos del DOM
      const adminView = document.getElementById('admin-view');
      const viewerView = document.getElementById('viewer-view');
      const input1 = document.getElementById('input1');
      const input1Title = document.getElementById('input1-title');
      const input2 = document.getElementById('input2');
      const input2Title = document.getElementById('input2-title');
      const stream1Select = document.getElementById('stream1-select');
      const stream2Select = document.getElementById('stream2-select');
      const saveStream1 = document.getElementById('save-stream1');
      const saveStream2 = document.getElementById('save-stream2');
      const btnGenerate = document.getElementById('btn-generate');
      const resultBox = document.getElementById('result-box');
      const urlOutput = document.getElementById('url-output');
      const btnCopy = document.getElementById('btn-copy');
      const textCopy = document.getElementById('text-copy');
      const iconCopy = document.getElementById('icon-copy');
      const videoContainer = document.getElementById('video-container');
      const btnFullscreen = document.getElementById('btn-fullscreen');

      // Bloquear ventanas emergentes
      window.open = function() { return null; };
      window.addEventListener('beforeunload', (e) => e.preventDefault());

      // Cargar streams desde Firestore en tiempo real
      const loadStreams = async () => {
        onSnapshot(streamsCol, (snapshot) => {
          const streams = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          // Limpiar selects
          stream1Select.innerHTML = '<option value="">-- Selecciona un stream guardado --</option>';
          stream2Select.innerHTML = '<option value="">-- Selecciona un stream guardado --</option>';
          
          streams.forEach(stream => {
            const option1 = document.createElement('option');
            option1.value = stream.url;
            option1.textContent = stream.title;
            stream1Select.appendChild(option1);
            
            const option2 = document.createElement('option');
            option2.value = stream.url;
            option2.textContent = stream.title;
            stream2Select.appendChild(option2);
          });
        });
      };
      
      await loadStreams();

      // Guardar streams
      saveStream1.addEventListener('click', async () => {
        if (input1.value.trim() && input1Title.value.trim()) {
          try {
            await addDoc(streamsCol, {
              title: input1Title.value.trim(),
              url: input1.value.trim(),
              createdAt: new Date()
            });
            input1Title.value = '';
            alert('¡Stream 1 guardado correctamente! ⚽');
          } catch (e) {
            console.error('Error:', e);
            alert('Error al guardar el stream');
          }
        }
      });

      saveStream2.addEventListener('click', async () => {
        if (input2.value.trim() && input2Title.value.trim()) {
          try {
            await addDoc(streamsCol, {
              title: input2Title.value.trim(),
              url: input2.value.trim(),
              createdAt: new Date()
            });
            input2Title.value = '';
            alert('¡Stream 2 guardado correctamente! ⚽');
          } catch (e) {
            console.error('Error:', e);
            alert('Error al guardar el stream');
          }
        }
      });

      // Al seleccionar un stream del menú, llenar el input
      stream1Select.addEventListener('change', () => {
        if (stream1Select.value) {
          input1.value = stream1Select.value;
        }
      });

      stream2Select.addEventListener('change', () => {
        if (stream2Select.value) {
          input2.value = stream2Select.value;
        }
      });

      // Función para verificar inputs
      const checkInputs = () => {
        if (input1.value.trim() || input2.value.trim()) {
          btnGenerate.disabled = false;
          btnGenerate.classList.remove('disabled:opacity-50', 'disabled:cursor-not-allowed');
        } else {
          btnGenerate.disabled = true;
          btnGenerate.classList.add('disabled:opacity-50', 'disabled:cursor-not-allowed');
        }
      };

      input1.addEventListener('input', checkInputs);
      input2.addEventListener('input', checkInputs);
      stream1Select.addEventListener('change', checkInputs);
      stream2Select.addEventListener('change', checkInputs);

      // 1. Detectar modo (Admin o Visor)
      const params = new URLSearchParams(window.location.search);
      const s1 = params.get('s1');
      const s2 = params.get('s2');

      if (s1 || s2) {
        // MODO VISOR (TV)
        viewerView.classList.remove('hidden');
        viewerView.classList.add('flex');
        
        const streams = [
          s1 ? decodeURIComponent(s1) : null, 
          s2 ? decodeURIComponent(s2) : null
        ].filter(Boolean);

        const isSplit = streams.length === 2;

        streams.forEach((url, index) => {
          const div = document.createElement('div');
          div.className = `relative ${isSplit ? 'w-full md:w-1/2 h-1/2 md:h-full border-b md:border-b-0 md:border-r border-slate-800' : 'w-full h-full'}`;
          
          // Estado inicial de audio
          let isMuted = localStorage.getItem(`stream-${index}-muted`) === 'true';
          
          // Construir URL inicial
          let initialUrl = url;
          
          // Intentar agregar parámetro de mute a URLs conocidas
          if (isMuted) {
            if (initialUrl.includes('youtube.com') || initialUrl.includes('youtube-nocookie.com') || initialUrl.includes('youtu.be')) {
              initialUrl = initialUrl.replace('mute=0', 'mute=1');
              if (!initialUrl.includes('mute=')) {
                initialUrl += (initialUrl.includes('?') ? '&' : '?') + 'mute=1';
              }
            } else if (initialUrl.includes('twitch.tv')) {
              initialUrl = initialUrl.replace('muted=false', 'muted=true');
              if (!initialUrl.includes('muted=')) {
                initialUrl += (initialUrl.includes('?') ? '&' : '?') + 'muted=true';
              }
            }
          }
          
          const iframe = document.createElement('iframe');
          iframe.id = `stream-iframe-${index}`;
          iframe.src = initialUrl;
          iframe.className = 'absolute top-0 left-0 w-full h-full';
          iframe.frameBorder = '0';
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          iframe.allowFullscreen = true;
          iframe.loading = 'lazy';
          iframe.referrerPolicy = 'no-referrer';
          
          div.appendChild(iframe);

          // Botón de audio (silencio/encendido)
          const audioBtn = document.createElement('button');
          audioBtn.id = `audio-btn-${index}`;
          audioBtn.className = 'absolute bottom-6 right-6 z-40 bg-black/80 hover:bg-black/95 text-white p-5 rounded-3xl opacity-80 hover:opacity-100 transition-all backdrop-blur-xl shadow-2xl';
          
          const updateAudioIcon = () => {
            if (isMuted) {
              audioBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
              audioBtn.style.backgroundColor = 'rgba(239, 68, 68, 0.9)';
            } else {
              audioBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
              audioBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            }
          };
          
          updateAudioIcon();
          
          audioBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            updateAudioIcon();
            localStorage.setItem(`stream-${index}-muted`, isMuted);
            
            // Intentar actualizar la URL del iframe para cambiar el estado de mute
            const iframeEl = document.getElementById(`stream-iframe-${index}`);
            let newUrl = iframeEl.src;
            
            if (newUrl.includes('youtube.com') || newUrl.includes('youtube-nocookie.com') || newUrl.includes('youtu.be')) {
              if (isMuted) {
                newUrl = newUrl.replace('mute=0', 'mute=1');
                if (!newUrl.includes('mute=')) {
                  newUrl += (newUrl.includes('?') ? '&' : '?') + 'mute=1';
                }
              } else {
                newUrl = newUrl.replace('mute=1', 'mute=0');
              }
              iframeEl.src = newUrl;
            } else if (newUrl.includes('twitch.tv')) {
              if (isMuted) {
                newUrl = newUrl.replace('muted=false', 'muted=true');
                if (!newUrl.includes('muted=')) {
                  newUrl += (newUrl.includes('?') ? '&' : '?') + 'muted=true';
                }
              } else {
                newUrl = newUrl.replace('muted=true', 'muted=false');
              }
              iframeEl.src = newUrl;
            }
          });
          
          div.appendChild(audioBtn);
          videoContainer.appendChild(div);
        });

      } else {
        // MODO ADMINISTRADOR (PC/Móvil)
        adminView.classList.remove('hidden');

        btnGenerate.addEventListener('click', () => {
          const baseUrl = window.location.origin + window.location.pathname;
          const newParams = new URLSearchParams();
          
          if (input1.value.trim()) newParams.append('s1', encodeURIComponent(input1.value));
          if (input2.value.trim()) newParams.append('s2', encodeURIComponent(input2.value));
          
          urlOutput.value = `${baseUrl}?${newParams.toString()}`;
          resultBox.classList.remove('hidden');
          
          btnCopy.classList.remove('bg-yellow-400', 'text-white');
          btnCopy.classList.add('bg-yellow-500', 'text-slate-900');
          textCopy.textContent = 'Copiar URL';
          iconCopy.innerHTML = '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>';
        });

        btnCopy.addEventListener('click', () => {
          const copySuccess = () => {
            btnCopy.classList.remove('bg-yellow-500');
            btnCopy.classList.add('bg-green-500');
            textCopy.textContent = '¡Copiado!';
            iconCopy.innerHTML = '<path d="M20 6 9 17l-5-5"/>';
            
            setTimeout(() => {
              btnCopy.classList.remove('bg-green-500');
              btnCopy.classList.add('bg-yellow-500');
              textCopy.textContent = 'Copiar URL';
              iconCopy.innerHTML = '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>';
            }, 3000);
          };

          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(urlOutput.value).then(copySuccess);
          } else {
            urlOutput.select();
            document.execCommand('copy');
            copySuccess();
          }
        });
      }

      // Funcionalidad de Pantalla Completa
      const iconFullscreen = document.getElementById('icon-fullscreen');
      const textFullscreen = document.getElementById('text-fullscreen');

      const updateFullscreenUI = () => {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        
        if (isFullscreen) {
          iconFullscreen.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>';
          textFullscreen.textContent = 'Salir';
        } else {
          iconFullscreen.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
          textFullscreen.textContent = 'Pantalla Completa';
        }
      };

      btnFullscreen.addEventListener('click', () => {
        const elem = viewerView;
        
        if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
          }
        } else {
          if (elem.requestFullscreen) {
            elem.requestFullscreen();
          } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
          } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
          }
        }
      });

      document.addEventListener('fullscreenchange', updateFullscreenUI);
      document.addEventListener('webkitfullscreenchange', updateFullscreenUI);
      document.addEventListener('msfullscreenchange', updateFullscreenUI);
    });
  </script>
</body>
</html>
