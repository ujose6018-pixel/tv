<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiStream TV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ocultar elementos fácilmente */
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen w-full font-sans selection:bg-indigo-500/30">

  <!-- ==========================================
       VISTA DEL ADMINISTRADOR (PC/Móvil)
       ========================================== -->
  <div id="admin-view" class="min-h-screen flex flex-col items-center py-12 px-4 sm:px-6 hidden">
    <div class="w-full max-w-2xl">
      
      <!-- Header -->
      <div class="flex items-center gap-3 mb-8 justify-center">
        <svg xmlns="http://www.w3.org/-svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="m10 9 5 3-5 3v-6Z"/></svg>
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
          Panel Multi-Stream TV
        </h1>
      </div>

      <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden">
        <div class="p-6 sm:p-8 space-y-6">
          
          <!-- Info Box -->
          <div class="bg-indigo-900/30 border border-indigo-500/30 rounded-lg p-4 flex gap-3 text-indigo-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            <p class="text-sm">
              Pega los enlaces de YouTube o Twitch. Si usas otra plataforma, asegúrate de pegar el enlace <strong>"Embed" (Insertar)</strong>. Puedes llenar uno solo o ambos.
            </p>
          </div>

          <!-- Inputs -->
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Stream 1 (Izquierda / Arriba)</label>
              <input id="input1" type="text" placeholder="Ej: https://www.youtube.com/watch?v=..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Stream 2 (Derecha / Abajo) <span class="text-slate-500 font-normal">- Opcional</span></label>
              <input id="input2" type="text" placeholder="Ej: https://www.twitch.tv/..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>
          </div>

          <button id="btn-generate" class="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-all flex items-center justify-center gap-2 opacity-50 cursor-not-allowed" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Generar Enlace para la TV
          </button>

          <!-- Resultado -->
          <div id="result-box" class="mt-8 p-6 bg-slate-900 rounded-xl border border-emerald-500/30 hidden">
            <h3 class="text-sm font-medium text-emerald-400 mb-3 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              ¡Enlace generado con éxito!
            </h3>
            
            <div class="flex flex-col sm:flex-row gap-3">
              <input id="url-output" readonly class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-300 text-sm focus:outline-none truncate">
              <button id="btn-copy" class="flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-medium transition-all bg-slate-700 hover:bg-slate-600 text-slate-200">
                <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                <span id="text-copy">Copiar URL</span>
              </button>
            </div>
            
            <p class="mt-4 text-sm text-slate-400 text-center">
              Copia esta URL y ábrela en el navegador web de tu Samsung Smart TV.
            </p>
          </div>
          
        </div>
      </div>
    </div>
  </div>

  <!-- ==========================================
       VISTA DEL VISOR (TV)
       ========================================== -->
  <div id="viewer-view" class="fixed inset-0 bg-black flex-col md:flex-row overflow-hidden w-full h-full hidden">
    <!-- Botón flotante para pantalla completa -->
    <button id="btn-fullscreen" class="absolute top-4 left-4 z-50 bg-black/60 hover:bg-black/90 text-white p-3 rounded-full opacity-50 hover:opacity-100 transition-opacity backdrop-blur-sm shadow-lg flex items-center gap-2 group" title="Poner en Pantalla Completa">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      <span class="hidden group-hover:inline font-medium text-sm pr-2">Pantalla Completa</span>
    </button>

    <div id="video-container" class="w-full h-full flex flex-col md:flex-row">
        <!-- Los iframes se inyectarán aquí por JavaScript -->
    </div>
  </div>

  <!-- ==========================================
       LÓGICA JAVASCRIPT NATIVO
       ========================================== -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Función para convertir URLs normales a Embed
      const parseStreamUrl = (url) => {
        if (!url) return '';
        let processedUrl = url.trim();
        
        // YouTube normal o YouTu.be
        const ytMatch = processedUrl.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
        if (ytMatch && ytMatch[1]) {
          return `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&mute=0`;
        }

        // Twitch
        const twitchMatch = processedUrl.match(/(?:twitch\.tv\/)([^"&?\/\s]+)/i);
        if (twitchMatch && twitchMatch[1]) {
          const hostname = window.location.hostname || 'localhost';
          return `https://player.twitch.tv/?channel=${twitchMatch[1]}&parent=${hostname}&autoplay=true`;
        }

        return processedUrl;
      };

      // Elementos del DOM
      const adminView = document.getElementById('admin-view');
      const viewerView = document.getElementById('viewer-view');
      const input1 = document.getElementById('input1');
      const input2 = document.getElementById('input2');
      const btnGenerate = document.getElementById('btn-generate');
      const resultBox = document.getElementById('result-box');
      const urlOutput = document.getElementById('url-output');
      const btnCopy = document.getElementById('btn-copy');
      const textCopy = document.getElementById('text-copy');
      const iconCopy = document.getElementById('icon-copy');
      const videoContainer = document.getElementById('video-container');
      const btnFullscreen = document.getElementById('btn-fullscreen');

      // 1. Detectar modo (Admin o Visor) leyendo la URL
      const params = new URLSearchParams(window.location.search);
      const s1 = params.get('s1');
      const s2 = params.get('s2');

      if (s1 || s2) {
        // MODO VISOR (TV)
        viewerView.classList.remove('hidden');
        viewerView.classList.add('flex');
        
        const streams = [
          s1 ? decodeURIComponent(s1) : null, 
          s2 ? decodeURIComponent(s2) : null
        ].filter(Boolean);

        const isSplit = streams.length === 2;

        streams.forEach((url, index) => {
          const div = document.createElement('div');
          // Clases de Tailwind para dividir la pantalla
          div.className = `relative ${isSplit ? 'w-full md:w-1/2 h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-800' : 'w-full h-full'}`;
          
          const iframe = document.createElement('iframe');
          iframe.src = url;
          iframe.className = "absolute top-0 left-0 w-full h-full";
          iframe.frameBorder = "0";
          iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
          iframe.allowFullscreen = true;
          
          div.appendChild(iframe);
          videoContainer.appendChild(videoContainer.firstChild ? div : div);
        });

      } else {
        // MODO ADMINISTRADOR (PC/Móvil)
        adminView.classList.remove('hidden');

        // Habilitar/Deshabilitar botón de generar
        const checkInputs = () => {
          if (input1.value.trim() || input2.value.trim()) {
            btnGenerate.disabled = false;
            btnGenerate.classList.remove('opacity-50', 'cursor-not-allowed');
          } else {
            btnGenerate.disabled = true;
            btnGenerate.classList.add('opacity-50', 'cursor-not-allowed');
          }
        };

        input1.addEventListener('input', checkInputs);
        input2.addEventListener('input', checkInputs);

        // Generar URL
        btnGenerate.addEventListener('click', () => {
          const baseUrl = window.location.origin + window.location.pathname;
          const newParams = new URLSearchParams();
          
          if (input1.value.trim()) newParams.append('s1', encodeURIComponent(parseStreamUrl(input1.value)));
          if (input2.value.trim()) newParams.append('s2', encodeURIComponent(parseStreamUrl(input2.value)));
          
          urlOutput.value = `${baseUrl}?${newParams.toString()}`;
          resultBox.classList.remove('hidden');
          
          // Resetear botón de copiar
          btnCopy.classList.remove('bg-emerald-500', 'text-white');
          btnCopy.classList.add('bg-slate-700', 'text-slate-200');
          textCopy.textContent = 'Copiar URL';
          iconCopy.innerHTML = '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>';
        });

        // Copiar al portapapeles
        btnCopy.addEventListener('click', () => {
          const copySuccess = () => {
            btnCopy.classList.remove('bg-slate-700', 'text-slate-200');
            btnCopy.classList.add('bg-emerald-500', 'text-white');
            textCopy.textContent = 'Copiado';
            iconCopy.innerHTML = '<path d="M20 6 9 17l-5-5"/>'; // Icono de check
            
            setTimeout(() => {
              btnCopy.classList.remove('bg-emerald-500', 'text-white');
              btnCopy.classList.add('bg-slate-700', 'text-slate-200');
              textCopy.textContent = 'Copiar URL';
              iconCopy.innerHTML = '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>';
            }, 3000);
          };

          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(urlOutput.value).then(copySuccess);
          } else {
            // Respaldo
            urlOutput.select();
            document.execCommand('copy');
            copySuccess();
          }
        });
      }

      // Funcionalidad de Pantalla Completa (TV)
      btnFullscreen.addEventListener('click', () => {
        const elem = viewerView;
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
          elem.msRequestFullscreen();
        }
      });
    });
  </script>
</body>
</html>
